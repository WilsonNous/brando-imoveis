<section class="md:col-span-2 bg-white p-4 rounded-xl shadow-md border border-gray-100">

  <div class="flex justify-between items-center mb-3">
    <h2 class="font-semibold text-[color:var(--brand-blue)] text-lg">Imóveis cadastrados</h2>

    <form method="get" action="/admin" class="flex gap-2">
      <input name="q" placeholder="Filtrar por texto" value="{{ request.args.get('q','') }}" class="field text-sm">
      <button class="bg-gray-800 text-white px-3 py-2 rounded-md hover:bg-gray-900 transition text-sm">Filtrar</button>
    </form>
  </div>

  <div class="overflow-auto max-h-[70vh] rounded-md border border-gray-200">
    <table class="min-w-full text-sm">
      <thead class="bg-[color:var(--brand-blue)] text-white">
        <tr class="text-left">
          <th class="py-2 px-2">#</th>
          <th class="py-2 px-2">Imagem</th>
          <th class="py-2 px-2">Código</th>
          <th class="py-2 px-2">Descrição</th> <!-- NOVA COLUNA -->
          <th class="py-2 px-2">Tipo</th>
          <th class="py-2 px-2">Bairro</th>
          <th class="py-2 px-2">Valor</th>
          <th class="py-2 px-2">Status</th>
          <th class="py-2 px-2">Ações</th>
        </tr>
      </thead>

      <tbody>
      {% for i in imoveis %}
        <tr class="border-b hover:bg-gray-50 transition">
          <td class="py-2 px-2">{{ i.id }}</td>

          <td class="py-2 px-2">
            {% if i.capa_url %}
              <img src="{{ i.capa_url }}"
                   class="w-12 h-12 rounded-md object-cover border border-gray-200 shadow-sm">
            {% else %}
              <div class="w-12 h-12 bg-gray-100 border flex items-center justify-center rounded text-gray-400 text-xs">
                sem
              </div>
            {% endif %}
          </td>

          <td class="py-2 px-2 font-semibold">{{ i.codigo }}</td>
          
          <!-- NOVA CÉLULA: DESCRIÇÃO -->
          <td class="py-2 px-2 max-w-xs">
            <span class="text-gray-700 line-clamp-2" title="{{ i.descricao or 'Sem descrição' }}">
              {{ i.descricao or '—' }}
            </span>
          </td>

          <td class="py-2 px-2">{{ i.tipo }}</td>
          <td class="py-2 px-2">{{ i.bairro }}</td>
          <td class="py-2 px-2 text-[color:var(--brand-blue)] font-semibold">{{ i.valor | brl }}</td>
          <td class="py-2 px-2">{{ i.status }}</td>

          <td class="py-2 px-2 flex gap-3">
            <a href="/admin/edit/{{ i.id }}" class="text-[color:var(--brand-blue)] underline hover:opacity-80">✏️ Editar</a>
            <a href="/admin/delete/{{ i.id }}"
               class="text-red-600 underline hover:opacity-80"
               onclick="return confirm('Excluir este imóvel?');">
               🗑️ Excluir
            </a>
          </td>
        </tr>
      {% endfor %}
      </tbody>

    </table>
  </div>
</section>
